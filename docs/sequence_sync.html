
<div id="seq" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#7F77DD' : '#534AB7',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    actorBkg: dark ? '#3C3489' : '#EEEDFE',
    actorBorder: dark ? '#7F77DD' : '#534AB7',
    actorTextColor: dark ? '#CECBF6' : '#26215C',
    activationBkgColor: dark ? '#534AB7' : '#CECBF6',
    activationBorderColor: dark ? '#7F77DD' : '#534AB7',
    signalColor: dark ? '#7F77DD' : '#534AB7',
    signalTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    labelBoxBkgColor: dark ? '#1A1530' : '#F5F3FF',
    labelBoxBorderColor: dark ? '#534AB7' : '#AFA9EC',
    labelTextColor: dark ? '#CECBF6' : '#26215C',
    loopTextColor: dark ? '#AFA9EC' : '#534AB7',
    noteBkgColor: dark ? '#085041' : '#E1F5EE',
    noteTextColor: dark ? '#9FE1CB' : '#085041',
    noteBorderColor: dark ? '#1D9E75' : '#0F6E56',
  },
});
const { svg } = await mermaid.render('seq-svg', `sequenceDiagram
  participant App as App (celular)
  participant API as Backend .NET
  participant DB as SQLite
  participant FS as Disco (.cbz)
  participant MX as MangaDex

  Note over App,API: Fase 1 — verificação de conexão
  App->>API: GET /api/health
  API-->>App: 200 OK

  Note over App,API: Fase 2 — manifest e diff
  App->>API: GET /api/sync/manifest
  API->>DB: SELECT chapters com download_status = done
  DB-->>API: lista de capítulos
  API-->>App: manifest [ { chapterId, hasFile, fileSize } ]
  App->>App: diff com library_item local

  Note over App,FS: Fase 3 — download seletivo
  loop Para cada capítulo faltando
    App->>API: GET /api/chapters/{id}/file
    API->>FS: stream .cbz (suporta Range)
    FS-->>API: bytes
    API-->>App: stream CBZ
    App->>App: grava .cbz no cartão SD
    App->>App: insere em library_item
  end

  Note over App,DB: Fase 4 — sync de progresso
  App->>API: POST /api/sync/progress [ { chapterId, lastPage, isRead } ]
  API->>DB: merge por updatedAt (last-write-wins)
  DB-->>API: ok
  API-->>App: 200 OK

  Note over API,MX: Download em background (independente do sync)
  API->>MX: GET /at-home/server/{chapterId}
  MX-->>API: baseUrl + hash + file list
  loop Páginas (respeitando 5 req/s)
    API->>MX: GET {baseUrl}/data/{hash}/{file}
    MX-->>API: bytes da página
  end
  API->>FS: salva .cbz montado
  API->>DB: download_status = done
`);
document.getElementById('seq').innerHTML = svg;
const svgEl = document.querySelector('#seq svg');
if (svgEl) { svgEl.style.width = '100%'; svgEl.style.maxWidth = '100%'; }
</script>
